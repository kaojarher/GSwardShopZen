    <script>
        // --- 1. 音效引擎 ---
        class SoundEngine {
            constructor() { this.ctx = null; this.enabled = true; }
            init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
            playTone(freq, type, duration) {
                if (!this.enabled) return; this.init();
                try {
                    let osc = this.ctx.createOscillator(); let gain = this.ctx.createGain();
                    osc.connect(gain); gain.connect(this.ctx.destination);
                    osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                    gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.005, this.ctx.currentTime + duration);
                    osc.start(); osc.stop(this.ctx.currentTime + duration);
                } catch(e) {}
            }
            shoot() { this.playTone(587.33, 'triangle', 0.1); }
            magic() { this.playTone(880, 'sine', 0.18); }
            hit() { this.playTone(150, 'sawtooth', 0.05); }
            coin() { this.playTone(987.77, 'sine', 0.05); setTimeout(() => this.playTone(1318.51, 'sine', 0.1), 50); }
            buy() { this.playTone(523.25, 'sine', 0.08); }
            defeat() { this.playTone(100, 'sawtooth', 0.4); }
        }
        const sfx = new SoundEngine();

        // --- 2. 遊戲配置與圖示圖鑑座標 ---
        const GRID_ROWS = 5; const GRID_COLS = 8;
        const SPRITE_SHEET_SRC = 'sprite-icons.jpg';
        
        // 核心裁切地圖（完全對齊您的原圖結構）
        const SPRITE_MAP = {
            sword:   { x: 28,  y: 63,  w: 138, h: 133 },
            crystal: { x: 216, y: 63,  w: 139, h: 133 },
            gourd:   { x: 405, y: 63,  w: 138, h: 133 },
            array:   { x: 28,  y: 240, w: 138, h: 128 },
            armor:   { x: 216, y: 240, w: 139, h: 128 },
            pouch:   { x: 405, y: 240, w: 138, h: 128 },
            mob_alien:    { x: 28,  y: 476, w: 138, h: 133 },
            mob_spider:   { x: 216, y: 476, w: 139, h: 133 },
            mob_oni:      { x: 405, y: 476, w: 138, h: 133 },
            mob_scorpion: { x: 28,  y: 655, w: 138, h: 130 },
            mob_dragon:   { x: 216, y: 655, w: 139, h: 130 },
            mob_ghost:    { x: 405, y: 655, w: 138, h: 130 },
            hero: { x: 170, y: 838, w: 110, h: 139 },
            boss: { x: 290, y: 838, w: 120, h: 139 }
        };

        const EQUIPMENT_LIBRARY = {
            sword: { id: 'sword', name: '青鋒雙劍', emoji: '⚔️', setId: 'wind', width: 2, height: 1, color: 'bg-gradient-to-r from-orange-500/20 to-red-500/20', atk: 18, hp: 0, magic: 0, aspd: 0.15, cost: 35, desc: '劍氣+18 / 身法+15%' },
            staff: { id: 'staff', name: '紫金葫蘆', emoji: '🔮', setId: 'elemental', width: 1, height: 3, color: 'bg-gradient-to-b from-violet-600/20 to-indigo-800/20', atk: 5, hp: 0, magic: 35, aspd: 0.05, cost: 50, desc: '真元+35 / 劍氣+5' },
            armor: { id: 'armor', name: '玄鐵護甲', emoji: '🛡️', setId: 'bastion', width: 2, height: 2, color: 'bg-gradient-to-br from-emerald-500/20 to-teal-700/20', atk: 0, hp: 150, magic: 0, aspd: -0.05, cost: 45, desc: '道行+150 / 身法-5%' },
            battery: { id: 'battery', name: '聚靈晶石', emoji: '🔋', setId: 'wind', width: 1, height: 1, color: 'bg-gradient-to-r from-yellow-500/20 to-amber-500/20', atk: 2, hp: 10, magic: 5, aspd: 0.20, cost: 25, desc: '疾如流光！身法+20%' },
            core: { id: 'core', name: '本命法陣', emoji: '⚙️', setId: 'elemental', width: 2, height: 2, color: 'bg-gradient-to-tr from-cyan-500/20 to-blue-600/20', atk: 10, hp: 80, magic: 20, aspd: 0.10, cost: 65, desc: '五行調和！全面提升' },
            chest: { id: 'chest', name: '納靈儲物袋', emoji: '📦', setId: 'bastion', width: 1, height: 2, color: 'bg-gradient-to-b from-amber-600/20 to-yellow-800/20', atk: 1, hp: 20, magic: 0, aspd: 0.0, cost: 30, desc: '靈石增幅！額外加成' }
        };

        const SET_LIBRARY = {
            wind: { name: '疾風劍訣', icon: '💨', members: ['sword', 'battery'], bonus: { aspd: 0.10 } },
            elemental: { name: '五行合一訣', icon: '🌌', members: ['staff', 'core'], bonus: { magic: 15 } },
            bastion: { name: '金剛護體訣', icon: '🏰', members: ['armor', 'chest'], bonus: { hp: 80 } }
        };

        const LIBRARY_ID_TO_SPRITE = { sword: 'sword', staff: 'gourd', armor: 'armor', battery: 'crystal', core: 'array', chest: 'pouch' };
        const MOB_EMOJI_TO_SPRITE = { '👾': 'mob_alien', '🕷️': 'mob_spider', '👹': 'mob_oni', '🦂': 'mob_scorpion', '🐉': 'mob_dragon', '👻': 'mob_ghost' };

        // --- 3. 動態即時去背與去除框線核心引擎 ---
        const rawImg = new Image();
        rawImg.src = SPRITE_SHEET_SRC;
        
        const cleanCanvas = document.createElement('canvas');
        const cCtx = cleanCanvas.getContext('2d');
        let processedDataURL = ''; 

        rawImg.onload = function() {
            cleanCanvas.width = rawImg.width;
            cleanCanvas.height = rawImg.height;
            cCtx.drawImage(rawImg, 0, 0);
            
            const imgData = cCtx.getImageData(0, 0, cleanCanvas.width, cleanCanvas.height);
            const data = imgData.data;
            
            // 遍歷所有元件區塊，採樣並剔除魔術綠底、方塊底色與白色包邊
            Object.values(SPRITE_MAP).forEach(s => {
                // 採樣該圖示內部左上角的特定底色（避開邊框線）
                const sampleX = Math.min(s.x + 10, s.x + s.w - 1);
                const sampleY = Math.min(s.y + 10, s.y + s.h - 1);
                const sIdx = (sampleY * cleanCanvas.width + sampleX) * 4;
                const bgR = data[sIdx], bgG = data[sIdx+1], bgB = data[sIdx+2];

                for (let y = s.y; y < s.y + s.h; y++) {
                    for (let x = s.x; x < s.x + s.w; x++) {
                        const idx = (y * cleanCanvas.width + x) * 4;
                        const r = data[idx], g = data[idx+1], b = data[idx+2];
                        
                        // 辨識規則 1: 外部大背景鮮綠色
                        const isPureGreen = (g > 180 && r < 75 && b < 75);
                        // 辨識規則 2: 內置方塊的墨綠底色 (色彩距離演算法)
                        const colorDist = Math.sqrt((r-bgR)**2 + (g-bgG)**2 + (b-bgB)**2);
                        const isBoxBg = colorDist < 55;
                        // 辨識規則 3: 各物件外圍的白色/淺灰圓角框線
                        const isWhiteBorder = (r > 190 && g > 190 && b > 190 && Math.abs(r-g) < 25 && Math.abs(g-b) < 25);
                        // 辨識規則 4: 框線邊緣殘留的過渡綠
                        const isEdgeGreen = (g > r * 1.15 && g > b * 1.15 && g > 90 && r < 110);

                        // 只要命中背景或白框，即將 Alpha 通道直接歸零 (完全透明)
                        if (isPureGreen || isBoxBg || isWhiteBorder || isEdgeGreen) {
                            data[idx + 3] = 0; 
                        }
                    }
                }
            });
            
            cCtx.putImageData(imgData, 0, 0);
            processedDataURL = cleanCanvas.toDataURL(); // 轉換為全局透明動態圖檔
            
            // 刷新受圖片加載延遲影響的 UI
            renderShop();
            renderEquippedItems();
        };

        // 供 CSS 元件使用的背景圖裁剪處理
        function getSpriteBackgroundStyle(spriteKey) {
            const s = SPRITE_MAP[spriteKey];
            if (!s) return '';
            const imgSource = processedDataURL || SPRITE_SHEET_SRC;
            const bgSizeX = (572 / s.w) * 100;
            const bgSizeY = (1024 / s.h) * 100;
            const posX = 572 === s.w ? 0 : (s.x / (572 - s.w)) * 100;
            const posY = 1024 === s.h ? 0 : (s.y / (1024 - s.h)) * 100;
            return `background-image:url('${imgSource}');background-size:${bgSizeX.toFixed(3)}% ${bgSizeY.toFixed(3)}%;background-position:${posX.toFixed(3)}% ${posY.toFixed(3)}%;background-repeat:no-repeat;`;
        }

        function renderIconHTML(libraryId, emoji, boxSizePx, extraClass) {
            const spriteKey = LIBRARY_ID_TO_SPRITE[libraryId];
            if (spriteKey) {
                return `<div class="${extraClass || ''}" style="width:${boxSizePx}px;height:${boxSizePx}px;${getSpriteBackgroundStyle(spriteKey)}"></div>`;
            }
            return `<span class="${extraClass || ''} flex items-center justify-center" style="width:${boxSizePx}px;height:${boxSizePx}px;font-size:20px;">${emoji}</span>`;
        }

        function renderIconHTMLResponsive(libraryId, emoji, extraClass) {
            const spriteKey = LIBRARY_ID_TO_SPRITE[libraryId];
            if (spriteKey) {
                return `<div class="${extraClass || ''} w-4/5 h-4/5" style="${getSpriteBackgroundStyle(spriteKey)}"></div>`;
            }
            return `<span class="${extraClass || ''}">${emoji}</span>`;
        }

        // --- 4. 遊戲核心狀態與初始化 ---
        const state = {
            gold: 150, gems: 5, wave: 1, monstersDefeatedThisWave: 0, monstersRequiredForNextWave: 10,
            hero: { hp: 200, maxHp: 200, baseAtk: 10, baseMagic: 0, baseAspd: 1.0, lastAttackTime: 0, lastMagicTime: 0 },
            grid: Array(GRID_ROWS).fill(null).map(() => Array(GRID_COLS).fill(null)),
            equippedItems: [], shopItems: [], pendingPlacement: null,
            monsters: [], projectiles: [], particles: [], floatingTexts: []
        };

        const goldDisplay = document.getElementById('gold-display');
        const gemDisplay = document.getElementById('gem-display');
        const waveDisplay = document.getElementById('wave-display');
        const waveProgress = document.getElementById('wave-progress');
        const waveProgressText = document.getElementById('wave-progress-text');
        const gridContainer = document.getElementById('backpack-grid-container');
        const shopContainer = document.getElementById('shop-items-container');
        const placementPanel = document.getElementById('placement-control-panel');
        const pendingEmoji = document.getElementById('pending-emoji');
        const pendingName = document.getElementById('pending-name');
        const pendingDesc = document.getElementById('pending-desc');
        const rotateBtn = document.getElementById('rotate-btn');
        const cancelPlacementBtn = document.getElementById('cancel-placement-btn');
        const refreshShopBtn = document.getElementById('refresh-shop-btn');
        const clearBagBtn = document.getElementById('clear-bag-btn');
        const soundToggle = document.getElementById('sound-toggle');
        const exportSaveBtn = document.getElementById('export-save-btn');
        const importSaveBtn = document.getElementById('import-save-btn');
        const importFileInput = document.getElementById('import-file-input');
        const statHp = document.getElementById('stat-hp');
        const statAtk = document.getElementById('stat-atk');
        const statMagic = document.getElementById('stat-magic');
        const statAspd = document.getElementById('stat-aspd');
        const customModal = document.getElementById('custom-modal');
        const modalIcon = document.getElementById('modal-icon');
        const modalTitle = document.getElementById('modal-title');
        const modalDesc = document.getElementById('modal-desc');
        const modalBtn = document.getElementById('modal-btn');
        const setBonusList = document.getElementById('set-bonus-list');
        const activeSetBanner = document.getElementById('active-set-banner');
        const activeSetName = document.getElementById('active-set-name');

        function initGridDOM() {
            gridContainer.innerHTML = '';
            for (let r = 0; r < GRID_ROWS; r++) {
                for (let c = 0; c < GRID_COLS; c++) {
                    const cell = document.createElement('div');
                    cell.className = `relative aspect-square rounded-md bg-slate-900 border border-slate-800 flex items-center justify-center cursor-pointer`;
                    cell.addEventListener('mouseenter', () => handleCellHover(r, c, true));
                    cell.addEventListener('mouseleave', () => handleCellHover(r, c, false));
                    cell.addEventListener('click', () => handleCellClick(r, c));
                    gridContainer.appendChild(cell);
                }
            }
        }

        function renderEquippedItems() {
            const cells = gridContainer.children;
            for (let i = 0; i < cells.length; i++) {
                cells[i].className = `relative aspect-square rounded-md bg-slate-900/90 border border-slate-800 flex items-center justify-center cursor-pointer`;
                cells[i].innerHTML = '';
            }
            state.equippedItems.forEach(item => {
                const { r, c, w, h, emoji, color, instanceId, libraryId } = item;
                for (let currR = r; currR < r + h; currR++) {
                    for (let currC = c; currC < c + w; currC++) {
                        const cell = cells[currR * GRID_COLS + currC];
                        if (cell) {
                            cell.className = `relative aspect-square rounded-md ${color} border border-purple-500/30 flex items-center justify-center cursor-pointer hover:brightness-110`;
                            if (currR === r && currC === c) {
                                cell.innerHTML = `
                                    ${renderIconHTMLResponsive(libraryId, emoji, 'z-10 select-none pointer-events-none drop-shadow-md animate-pulse-slow')}
                                    <button onclick="unequipItem('${instanceId}'); event.stopPropagation();" class="absolute -top-1 -right-1 bg-red-600 border border-white/20 text-[8px] text-white w-3.5 h-3.5 rounded-full flex items-center justify-center z-20">✕</button>
                                `;
                            }
                        }
                    }
                }
            });
        }

        function handleCellHover(r, c, isHover) {
            if (!state.pendingPlacement) return;
            const cells = gridContainer.children;
            for (let i = 0; i < cells.length; i++) cells[i].classList.remove('bg-emerald-500/30', 'bg-rose-500/30');
            if (!isHover) return;
            const { width: w, height: h } = state.pendingPlacement;
            const fit = checkFit(r, c, w, h);
            for (let currR = r; currR < r + h; currR++) {
                for (let currC = c; currC < c + w; currC++) {
                    if (currR < GRID_ROWS && currC < GRID_COLS) {
                        cells[currR * GRID_COLS + currC].classList.add(fit ? 'bg-emerald-500/30' : 'bg-rose-500/30');
                    }
                }
            }
        }

        function checkFit(startRow, startCol, w, h) {
            if (startRow + h > GRID_ROWS || startCol + w > GRID_COLS) return false;
            for (let r = startRow; r < startRow + h; r++) {
                for (let c = startCol; c < startCol + w; c++) {
                    if (state.grid[r][c] !== null) return false;
                }
            }
            return true;
        }

        function handleCellClick(r, c) {
            if (!state.pendingPlacement) return;
            const p = state.pendingPlacement;
            if (checkFit(r, c, p.width, p.height)) {
                if (p.isShopItem) state.gold -= p.cost;
                const instanceId = 'item_' + Date.now();
                const newItem = { instanceId, libraryId: p.libraryId, name: p.name, emoji: p.emoji, color: p.color, r, c, w: p.width, h: p.height, atk: p.atk, hp: p.hp, magic: p.magic, aspd: p.aspd, cost: p.cost };
                for (let currR = r; currR < r + p.height; currR++) {
                    for (let currC = c; currC < c + p.width; currC++) state.grid[currR][currC] = newItem;
                }
                state.equippedItems.push(newItem);
                sfx.buy(); state.pendingPlacement = null;
                placementPanel.classList.add('hidden');
                renderEquippedItems(); recalculateHeroStats(); updateResourceDisplay(); refreshShop();
            } else {
                sfx.playTone(180, 'sawtooth', 0.2);
            }
        }

        window.unequipItem = function(instanceId) {
            const idx = state.equippedItems.findIndex(i => i.instanceId === instanceId);
            if (idx > -1) {
                const item = state.equippedItems[idx];
                const refund = Math.floor(item.cost * 0.6);
                state.gold += refund; sfx.coin();
                for (let r = item.r; r < item.r + item.h; r++) {
                    for (let c = item.c; c < item.c + item.w; c++) state.grid[r][c] = null;
                }
                state.equippedItems.splice(idx, 1);
                renderEquippedItems(); recalculateHeroStats(); updateResourceDisplay();
            }
        };

        clearBagBtn.addEventListener('click', () => {
            state.grid = Array(GRID_ROWS).fill(null).map(() => Array(GRID_COLS).fill(null));
            state.equippedItems = []; renderEquippedItems(); recalculateHeroStats();
        });

        // --- 5. 商店運作邏輯 ---
        function refreshShop() {
            const keys = Object.keys(EQUIPMENT_LIBRARY);
            state.shopItems = [];
            for (let i = 0; i < 3; i++) {
                state.shopItems.push({ ...EQUIPMENT_LIBRARY[keys[Math.floor(Math.random() * keys.length)]] });
            }
            renderShop();
        }

        function renderShop() {
            shopContainer.innerHTML = '';
            state.shopItems.forEach(item => {
                const affordable = state.gold >= item.cost;
                const card = document.createElement('div');
                card.className = `bg-slate-950 p-2 rounded-xl border-2 flex flex-col justify-between cursor-pointer ${affordable ? 'border-slate-800 hover:border-purple-500' : 'border-slate-900 opacity-50'}`;
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        ${renderIconHTML(item.id, item.emoji, 36, 'rounded bg-slate-900 border border-slate-800')}
                        <span class="text-[8px] bg-slate-800 text-slate-400 px-1 rounded">${item.width}x${item.height}</span>
                    </div>
                    <div class="my-1">
                        <h4 class="text-[10px] font-bold text-slate-200 truncate">${item.name}</h4>
                        <p class="text-[8px] text-slate-400 line-clamp-1 leading-tight">${item.desc}</p>
                    </div>
                    <button class="w-full py-0.5 rounded text-[10px] font-bold ${affordable ? 'bg-purple-600 text-white' : 'bg-slate-800 text-slate-500'}">🪙 ${item.cost}</button>
                `;
                if (affordable) card.addEventListener('click', () => selectShopItem(item));
                shopContainer.appendChild(card);
            });
        }

        function selectShopItem(item) {
            state.pendingPlacement = { ...item, libraryId: item.id, isShopItem: true };
            placementPanel.classList.remove('hidden');
            pendingEmoji.innerHTML = renderIconHTML(item.id, item.emoji, 32, '');
            pendingName.textContent = item.name;
            pendingDesc.textContent = `尺寸: ${item.width}x${item.height}`;
        }

        rotateBtn.addEventListener('click', () => {
            if (!state.pendingPlacement) return;
            const tmp = state.pendingPlacement.width;
            state.pendingPlacement.width = state.pendingPlacement.height;
            state.pendingPlacement.height = tmp;
            pendingDesc.textContent = `已旋轉為: ${state.pendingPlacement.width}x${state.pendingPlacement.height}`;
        });

        cancelPlacementBtn.addEventListener('click', () => { state.pendingPlacement = null; placementPanel.classList.add('hidden'); });
        refreshShopBtn.addEventListener('click', () => { if (state.gold >= 10) { state.gold -= 10; refreshShop(); updateResourceDisplay(); } });

        // --- 6. 數值與套裝計算 ---
        function recalculateHeroStats() {
            let atk = 10, hp = 200, magic = 0, aspd = 1.0;
            state.equippedItems.forEach(i => { atk += i.atk; hp += i.hp; magic += i.magic; aspd += i.aspd; });
            
            const eqIds = new Set(state.equippedItems.map(i => i.libraryId));
            setBonusList.innerHTML = '';
            Object.entries(SET_LIBRARY).forEach(([id, def]) => {
                const active = def.members.every(m => eqIds.has(m));
                if (active) { hp += def.bonus.hp || 0; magic += def.bonus.magic || 0; aspd += def.bonus.aspd || 0; }
                const row = document.createElement('div');
                row.className = `flex justify-between text-[9px] p-1 rounded ${active ? 'bg-amber-950/40 border border-amber-800 text-amber-300' : 'text-slate-500'}`;
                row.innerHTML = `<span>${def.icon} ${def.name}</span><span>${active?'已觸發':'未湊齊'}</span>`;
                setBonusList.appendChild(row);
            });

            state.hero.maxHp = hp; if (state.hero.hp > hp || state.hero.hp === 200) state.hero.hp = hp;
            state.hero.baseAtk = atk; state.hero.baseMagic = magic; state.hero.baseAspd = Math.max(0.4, aspd);
            statHp.textContent = `${Math.round(state.hero.hp)}/${hp}`;
            statAtk.textContent = atk; statMagic.textContent = magic; statAspd.textContent = `${state.hero.baseAspd.toFixed(1)}x`;
        }

        function updateResourceDisplay() {
            goldDisplay.textContent = state.gold; gemDisplay.textContent = state.gems;
            waveDisplay.textContent = `渡劫 第${state.wave}重`;
            const pct = (state.monstersDefeatedThisWave / state.monstersRequiredForNextWave) * 100;
            waveProgress.style.width = `${pct}%`;
            waveProgressText.textContent = `${state.monstersDefeatedThisWave}/${state.monstersRequiredForNextWave}`;
        }

        // --- 7. Canvas 2.5D 戰鬥渲染核心 ---
        const canvas = document.getElementById('battle-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const r = canvas.getBoundingClientRect();
            canvas.width = r.width * window.devicePixelRatio; canvas.height = r.height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        function worldToScreen(d, offset = 0) {
            const w = canvas.width / window.devicePixelRatio, h = canvas.height / window.devicePixelRatio;
            const y = (h * 0.66) + offset * (h * 0.15);
            const x = w / 2 + (d - 0.5) * (w - 40) * (0.8 + 0.2 * offset);
            return { x, y, scale: 0.7 + 0.5 * offset };
        }

        function spawnMonster(isBoss = false) {
            const emojis = ['👾', '🕷️', '👹', '🦂', '🐉', '👻'];
            const emo = isBoss ? '👑' : emojis[Math.floor(Math.random() * emojis.length)];
            const sk = isBoss ? 'boss' : MOB_EMOJI_TO_SPRITE[emo];
            const hp = (50 + state.wave * 35) * (isBoss ? 4 : 1);
            state.monsters.push({ emoji: emo, spriteKey: sk, d: 1.1, offset: (Math.random() - 0.5) * 1.5, speed: 0.12 + Math.random() * 0.1, hp, maxHp: hp, damage: 10 + state.wave * 3, isBoss });
        }

        function drawSpriteIconCanvas(cx, cy, size, spriteKey, fallbackEmoji) {
            const s = SPRITE_MAP[spriteKey];
            const targetImg = processedDataURL ? cleanCanvas : rawImg; // 自動切換為去背離屏畫布
            if (s && targetImg.complete) {
                ctx.drawImage(targetImg, s.x, s.y, s.w, s.h, cx - size / 2, cy - size / 2, size, size);
            } else {
                ctx.font = `${size}px Arial`; ctx.fillText(fallbackEmoji, cx, cy + size/3);
            }
        }

        function updateAndRenderBattle(timestamp) {
            const w = canvas.width / window.devicePixelRatio, h = canvas.height / window.devicePixelRatio;
            ctx.clearRect(0, 0, w, h);
            
            // 繪製背景與草地
            ctx.fillStyle = '#bae6fd'; ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = '#4d7c0f'; ctx.fillRect(0, h * 0.5, w, h * 0.5);

            // 刷怪計時器
            if (state.monsters.length < 4 && state.monstersDefeatedThisWave < state.monstersRequiredForNextWave) {
                if (Math.random() < 0.01) spawnMonster(state.monstersDefeatedThisWave === state.monstersRequiredForNextWave - 1);
            }

            // 自動攻擊
            const cd = 1000 / state.hero.baseAspd;
            if (timestamp - state.hero.lastAttackTime > cd && state.monsters.length > 0) {
                const target = state.monsters[0];
                state.projectiles.push({ type: 'slash', curD: 0.15, targetD: target.d, offset: target.offset, damage: state.hero.baseAtk });
                state.hero.lastAttackTime = timestamp; sfx.shoot();
            }

            // 渲染英雄主角
            const pHero = worldToScreen(0.15, 0);
            drawSpriteIconCanvas(pHero.x, pHero.y - 15, 45 * pHero.scale, 'hero', '🧙‍♂️');

            // 處理怪物行為與渲染
            for (let i = state.monsters.length - 1; i >= 0; i--) {
                const m = state.monsters[i];
                m.d -= m.speed * 0.0015;
                const pMon = worldToScreen(m.d, m.offset);

                if (m.d <= 0.18) {
                    state.hero.hp -= m.damage / 60;
                    recalculateHeroStats();
                    if (state.hero.hp <= 0) { handleGameOver(); return; }
                }

                drawSpriteIconCanvas(pMon.x, pMon.y - 12, (m.isBoss ? 55 : 35) * pMon.scale, m.spriteKey, m.emoji);
                
                // 血條
                ctx.fillStyle = '#1e293b'; ctx.fillRect(pMon.x - 15, pMon.y - 30, 30, 3);
                ctx.fillStyle = '#purple'; ctx.fillStyle = '#a855f7'; ctx.fillRect(pMon.x - 15, pMon.y - 30, 30 * (m.hp / m.maxHp), 3);

                if (m.hp <= 0) {
                    state.monstersDefeatedThisWave++; state.gold += m.isBoss ? 50 : 10;
                    state.monsters.splice(i, 1); sfx.hit(); updateResourceDisplay();
                    if (state.monstersDefeatedThisWave >= state.monstersRequiredForNextWave) { handleWaveCleared(); return; }
                }
            }

            // 處理飛行彈道
            for (let i = state.projectiles.length - 1; i >= 0; i--) {
                const p = state.projectiles[i]; p.curD += 0.04;
                const pLoc = worldToScreen(p.curD, p.offset);
                ctx.fillStyle = '#facc15'; ctx.beginPath(); ctx.arc(pLoc.x, pLoc.y - 15, 5, 0, Math.PI*2); ctx.fill();

                if (p.curD >= p.targetD) {
                    if (state.monsters.length > 0) state.monsters[0].hp -= p.damage;
                    state.projectiles.splice(i, 1);
                }
            }

            requestAnimationFrame(updateAndRenderBattle);
        }

        // --- 8. 遊戲進程與彈窗控制 ---
        function showModal(icon, title, desc, btnText, cb) {
            modalIcon.textContent = icon; modalTitle.textContent = title; modalDesc.textContent = desc; modalBtn.textContent = btnText;
            modalBtn.onclick = cb; customModal.classList.remove('hidden');
        }
        function handleWaveCleared() {
            showModal('🏆', `重天大捷！`, `恭喜成功渡過第 ${state.wave} 重天劫。`, '晉升下一重修為', () => {
                state.wave++; state.monstersDefeatedThisWave = 0; state.monsters = [];
                state.monstersRequiredForNextWave = 10 + state.wave * 2;
                customModal.classList.add('hidden'); updateResourceDisplay(); refreshShop();
            });
        }
        function handleGameOver() {
            sfx.defeat();
            showModal('💀', `形神俱滅`, `道友身死道消，不幸在第 ${state.wave} 重天劫中隕落。`, '重聚元神', () => {
                state.hero.hp = state.hero.maxHp; state.monsters = []; state.monstersDefeatedThisWave = 0;
                customModal.classList.add('hidden'); recalculateHeroStats(); updateResourceDisplay();
            });
        }

        // --- 9. 啟動入口 ---
        window.onload = function() {
            initGridDOM(); refreshShop(); updateResourceDisplay(); recalculateHeroStats();
            requestAnimationFrame(updateAndRenderBattle);
        };
    </script>
</body>
</html>
